name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ── Stage 1: Test ─────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

  # ── Stage 2: Build Docker Image ───────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test   # Only build if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t book-rec-system:${{ github.sha }} .
          docker tag book-rec-system:${{ github.sha }} book-rec-system:latest
          echo "✅ Docker image built successfully"

      - name: Smoke test container
        run: |
          docker run -d --name test-container \
            -p 8000:8000 \
            book-rec-system:latest
          sleep 15
          curl --fail http://localhost:8000/ || exit 1
          echo "✅ API health check passed"
          docker stop test-container

  # ── Stage 3: Push to Docker Hub (on main branch only) ─────────────────────
  push:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/book-rec-system:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/book-rec-system:${{ github.sha }}
